name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    # Provision d'un service PostgreSQL 17 pour les tests
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U postgres -d testdb
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # Variables d'environnement pour Spring Boot afin d'utiliser PostgreSQL
    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/testdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

    steps:
      # 1️⃣ Checkout du code
      - uses: actions/checkout@v4

      # 2️⃣ Installer JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # 3️⃣ Build + tests Maven
      - name: Build and Test with Maven
        run: mvn -B clean verify

      # 4️⃣ Lister les fichiers XML générés (optionnel pour debug)
      - name: List Test Reports
        run: ls -R target/surefire-reports/*.xml || echo "No reports found"

      # 5️⃣ Publier les rapports JUnit et créer un check run
      - name: Publish Test Report
        if: success() || failure()
        uses: dorny/test-reporter@v1
        with:
          name: JUnit
          path: 'target/surefire-reports/*.xml'
          reporter: java-junit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
